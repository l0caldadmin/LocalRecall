name: Run Go Tests

on:
  push:
    branches:
      - 'main'

concurrency:
  group: ci-${{ github.head_ref || github.ref }}-${{ github.repository }}
  cancel-in-progress: true

jobs:
  runs-on: self-hosted
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.5'

    - name: Install dependencies
      run: go mod tidy

    - name: Run unit tests
      run: make test-unit

  integration-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.5'

    - name: Install dependencies
      run: go mod tidy

    - name: Run integration tests
      env:
        INTEGRATION: "true"
      run: make test-integration

  e2e-tests:
      runs-on: ubuntu-latest
  
      steps:
      - name: Checkout code
        uses: actions/checkout@v7
  
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
  
      - name: Install dependencies
        run: go mod tidy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run E2E tests
        env:
          E2E: "true"
        run: make test-e2e
